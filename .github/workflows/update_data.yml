name: Update Peachtree Weather Data

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Single year to update, e.g. 2025. Leave blank to use current year."
        required: false
        type: string
      start_year:
        description: "Range start year. Use with end_year."
        required: false
        type: string
      end_year:
        description: "Range end year. Use with start_year."
        required: false
        type: string

  schedule:
    # July 5 at 8:17 AM UTC / 4:17 AM Eastern during DST
    - cron: "17 8 5 7 *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas playwright
          python -m playwright install chromium

      - name: Update weather data
        run: |
          YEAR="${{ github.event.inputs.year }}"
          START_YEAR="${{ github.event.inputs.start_year }}"
          END_YEAR="${{ github.event.inputs.end_year }}"

          if [ -n "$START_YEAR" ] && [ -n "$END_YEAR" ]; then
            echo "Updating range: $START_YEAR-$END_YEAR"
            python scripts/update_data.py \
              --start-year "$START_YEAR" \
              --end-year "$END_YEAR" \
              --csv peachtree-start-conditions.csv

          elif [ -n "$YEAR" ]; then
            echo "Updating year: $YEAR"
            python scripts/update_data.py \
              --year "$YEAR" \
              --csv peachtree-start-conditions.csv

          else
            CURRENT_YEAR="$(date +'%Y')"
            echo "No year supplied. Updating current year: $CURRENT_YEAR"
            python scripts/update_data.py \
              --year "$CURRENT_YEAR" \
              --csv peachtree-start-conditions.csv
          fi

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add peachtree-start-conditions.csv

          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
          else
            git commit -m "Update Peachtree weather data"
            git push
          fi