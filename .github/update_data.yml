name: Update Peachtree Weather Data

on:
  workflow_dispatch:
  schedule:
    # July 5 at 8:17 AM UTC / 4:17 AM Eastern during DST
    - cron: "17 8 5 7 *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas playwright
          python -m playwright install chromium

      - name: Update current year data
        run: |
          python scripts/update_data.py --year "$(date +'%Y')" --csv peachtree-start-conditions.csv

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add peachtree-start-conditions.csv

          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
          else
            git commit -m "Update Peachtree weather data for $(date +'%Y')"
            git push
          fi